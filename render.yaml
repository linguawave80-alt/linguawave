services:
  # ─── Backend: Express API + Socket.IO ────────────────────────────────────────
  - type: web
    name: linguawave-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false          # Set in Render dashboard
      - key: DATABASE_URL
        sync: false          # Set in Render dashboard (Neon PostgreSQL)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: GROQ_API_KEY
        sync: false          # Set in Render dashboard
      - key: OPENAI_API_KEY
        sync: false          # Set in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false          # Set in Render dashboard (for OAuth)
      - key: GOOGLE_CLIENT_SECRET
        sync: false          # Set in Render dashboard
      - key: GOOGLE_CALLBACK_URL
        sync: false          # e.g. https://linguawave-backend.onrender.com/api/v1/auth/google/callback
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://linguawave-frontend.onrender.com

  # ─── Frontend: Static HTML/CSS/JS ────────────────────────────────────────────
  - type: web
    name: linguawave-frontend
    runtime: static
    rootDir: frontend/public
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /pages/*
        destination: /pages/:splat
      - type: rewrite
        source: /*
        destination: /index.html
