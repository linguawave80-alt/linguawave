<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaWave — Reset Password</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .reset-card {
      width: 100%;
      max-width: 420px;
      background: #0d1120;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 32px;
      padding: 40px 36px;
      position: relative;
      z-index: 1;
    }

    .reset-card h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .reset-card p {
      font-size: .875rem;
      color: var(--text-2);
      margin-bottom: 28px;
    }

    .success-state {
      text-align: center;
      padding: 20px 0;
    }

    .success-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
  </style>
</head>

<body>
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="reset-card" id="resetCard">
    <!-- Forgot password form (shown when no token in URL) -->
    <div id="forgotView">
      <h2>Forgot password?</h2>
      <p>Enter your email and we'll send you a reset link.</p>
      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="forgotEmail">Email</label>
          <input type="email" id="forgotEmail" placeholder="you@example.com" required />
          <span class="field-error" id="forgotEmailErr"></span>
        </div>
        <div class="form-toast" id="forgotToast"></div>
        <button type="submit" class="btn-form" id="forgotSubmit">
          <span>Send Reset Link</span>
          <div class="btn-spinner hidden"></div>
        </button>
      </form>
      <p style="margin-top:16px;text-align:center">
        <a href="/" style="color:var(--teal);font-size:.875rem">← Back to home</a>
      </p>
    </div>

    <!-- New password form (shown when ?token= present) -->
    <div id="resetView" class="hidden">
      <h2>Set new password</h2>
      <p>Choose a strong password for your account.</p>
      <form id="resetForm" novalidate>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-wrap">
            <input type="password" id="newPassword" placeholder="Min. 8 characters" minlength="8" required />
            <button type="button" class="toggle-pw" data-target="newPassword">👁</button>
          </div>
          <div class="pw-strength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
          <span class="field-error" id="resetPwErr"></span>
        </div>
        <div class="form-toast" id="resetToast"></div>
        <button type="submit" class="btn-form" id="resetSubmit">
          <span>Update Password</span>
          <div class="btn-spinner hidden"></div>
        </button>
      </form>
    </div>

    <!-- Success state -->
    <div id="successView" class="hidden success-state">
      <div class="icon">✅</div>
      <h2>Password updated!</h2>
      <p>Your password has been changed. You can now log in with your new password.</p>
      <a href="/" class="btn-form" style="display:block;text-align:center;margin-top:16px;text-decoration:none">
        Go to Login
      </a>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/api.js"></script>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (token) {
        document.getElementById('forgotView').classList.add('hidden');
        document.getElementById('resetView').classList.remove('hidden');
      }

      // Password strength
      document.getElementById('newPassword')?.addEventListener('input', (e) => {
        const pw = e.target.value;
        let score = 0;
        if (pw.length >= 8) score++;
        if (pw.length >= 12) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        const levels = [
          null,
          { label: 'Weak', color: '#FF6B6B', pct: 20 },
          { label: 'Fair', color: '#FFD166', pct: 45 },
          { label: 'Good', color: '#06D6A0', pct: 70 },
          { label: 'Strong', color: '#7FFFD4', pct: 100 },
        ];
        const s = levels[Math.min(score, 4)] || levels[1];
        document.getElementById('strengthFill').style.cssText = `width:${s.pct}%;background:${s.color}`;
        const lbl = document.getElementById('strengthLabel');
        lbl.textContent = s.label; lbl.style.color = s.color;
      });

      // Toggle password visibility
      document.querySelectorAll('.toggle-pw').forEach(btn => {
        btn.addEventListener('click', () => {
          const inp = document.getElementById(btn.dataset.target);
          inp.type = inp.type === 'password' ? 'text' : 'password';
          btn.textContent = inp.type === 'password' ? '👁' : '🙈';
        });
      });

      const setLoading = (id, loading) => {
        const btn = document.getElementById(id);
        const span = btn?.querySelector('span');
        const spin = btn?.querySelector('.btn-spinner');
        if (btn) btn.disabled = loading;
        if (span) span.style.opacity = loading ? '0' : '1';
        if (spin) spin.classList.toggle('hidden', !loading);
      };

      const showToast = (id, msg, type) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = msg;
        el.className = `form-toast ${type} show`;
        setTimeout(() => el.classList.remove('show'), 5000);
      };

      // Forgot form
      document.getElementById('forgotForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('forgotEmail').value.trim();
        if (!email) { document.getElementById('forgotEmailErr').textContent = 'Email required'; return; }
        setLoading('forgotSubmit', true);
        try {
          await fetch('/api/v1/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          showToast('forgotToast', '📧 Reset link sent! Check your inbox.', 'success');
        } catch {
          showToast('forgotToast', 'Something went wrong. Try again.', 'error');
        } finally { setLoading('forgotSubmit', false); }
      });

      // Reset form
      document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('newPassword').value;
        if (password.length < 8) { document.getElementById('resetPwErr').textContent = 'Min 8 characters'; return; }
        setLoading('resetSubmit', true);
        try {
          const res = await fetch(`/api/v1/auth/reset-password/${token}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });
          const data = await res.json();
          if (!data.success) throw new Error(data.error);
          document.getElementById('resetView').classList.add('hidden');
          document.getElementById('successView').classList.remove('hidden');
        } catch (err) {
          showToast('resetToast', err.message || 'Reset failed. Link may have expired.', 'error');
        } finally { setLoading('resetSubmit', false); }
      });
    })();
  </script>
</body>

</html>
